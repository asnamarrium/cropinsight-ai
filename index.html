<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CropInsight AI</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    text-align: center;

    /* 🔥 Background similar to your image */
   background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)),
            url("/static/crop_img.jpg");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;

    color: white;
}

/* Center container */
.container {
    width: 450px;
    margin: 80px auto;
    padding: 30px;
    border-radius: 20px;

    /* Glass effect */
    background: rgba(5, 35, 25, 0.7);
    backdrop-filter: blur(14px);

    border: 1px solid rgba(34,197,94,0.4);
    box-shadow: 0px 20px 50px rgba(0,0,0,0.6);
}

/* Title */
h1 {
    font-size: 36px;
    margin-bottom: 10px;
}

h1 span {
    color: #22c55e;
}

/* Subtitle */
.tagline {
    color: #d1fae5;
    margin-bottom: 25px;
}

/* Divider */
.divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, #22c55e, transparent);
    margin: 20px 0;
}

/* Upload text */
.upload-text {
    font-size: 18px;
}

/* File input */
input[type="file"] {
    margin: 15px 0;
    padding: 10px;
    border-radius: 10px;
    border: none;
}

/* Button */
button {
    padding: 12px 28px;
    background: linear-gradient(135deg, #16a34a, #22c55e);
    color: white;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
}

/* Image preview */
img {
    margin-top: 15px;
    max-width: 100%;
    border-radius: 12px;
    border: 1px solid rgba(34,197,94,0.4);
}

/* Result */
#result {
    margin-top: 15px;
    font-weight: bold;
    color: #bbf7d0;
}

/* Treatment */
#treatment {
    margin-top: 10px;
    text-align: left;
    color: #ecfdf5;
}

/* Footer */
.footer {
    margin-top: 20px;
    font-size: 14px;
    color: #a7f3d0;
}
</style>

</head>

<body>

<div class="container">

    <h1>🌿 CropInsight <span>AI</span></h1>
    <p class="tagline">AI-Powered Crop Disease Detection</p>

    <div class="divider"></div>

    <p class="upload-text">Upload crop leaf image</p>

    <input type="file" id="fileInput" accept="image/*">
    <br>

    <button onclick="predict()">Predict</button>

    <div id="preview"></div>
    <div id="result"></div>
    <div id="treatment"></div>

    <div class="footer">
        Detect early. Act smart. Save future.
    </div>

</div>

<script>
async function predict() {
    const fileInput = document.getElementById("fileInput");
    const resultDiv = document.getElementById("result");
    const treatmentDiv = document.getElementById("treatment");
    const previewDiv = document.getElementById("preview");

    if (!fileInput.files || fileInput.files.length === 0) {
        alert("Please select an image!");
        return;
    }

    const file = fileInput.files[0];

    const img = document.createElement("img");
    img.src = URL.createObjectURL(file);
    previewDiv.innerHTML = "";
    previewDiv.appendChild(img);

    const formData = new FormData();
    formData.append("file", file);

    resultDiv.innerHTML = "⏳ Processing...";
    treatmentDiv.innerHTML = "";

    try {
        const response = await fetch("/predict", {
            method: "POST",
            body: formData
        });

        const data = await response.json();
        console.log("Backend response:", data);

        if (!response.ok || data.detail || data.error) {
            resultDiv.innerHTML = "❌ Error: " + (data.detail || data.error || "Prediction failed");
            return;
        }

        let disease =
            data.full_name ||
            data.prediction ||
            data.predicted_class ||
            data.class_name ||
            data.disease ||
            data.label ||
            data.result;

        const confidence =
            data.confidence_percentage ||
            data.confidence ||
            data.confidence_score ||
            data.probability ||
            data.score;

        if (!disease && data.class !== undefined) {
            disease = "Class " + data.class;
        }

       if (!disease) {
           resultDiv.innerHTML = "❌ Wrong backend response. Check terminal/console.";
           return;
        }

        resultDiv.innerHTML =
            "🌱 Disease: " + disease +
            "<br>📊 Confidence: " + (confidence || "N/A");

        if (data.treatment && Array.isArray(data.treatment)) {
            let html = "<h3>🩺 Treatment:</h3><ul>";
            data.treatment.forEach(item => {
                html += "<li>" + item + "</li>";
            });
            html += "</ul>";
            treatmentDiv.innerHTML = html;
        }

    } catch (error) {
        console.error("Frontend error:", error);
        resultDiv.innerHTML = "❌ Error connecting to server";
    }
}
</script>

</body>
</html>
